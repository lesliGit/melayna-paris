<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test Backend</title></head>
<body>
<h2>Test connexion backend Melayna</h2>
<button onclick="tester()">Envoyer commande test</button>
<pre id="result" style="background:#f0f0f0;padding:20px;margin-top:20px;"></pre>

<script>
function tester() {
  document.getElementById("result").textContent = "Envoi en cours...";

  fetch("https://melayna-paris.infinityfreeapp.com/save-order.php", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      paypal_order_id: "TEST123",
      prenom: "Marie",
      nom: "Test",
      email: "Taylenashop@gmail.com",
      tel: "0612345678",
      adresse: "1 rue de la Paix",
      code_postal: "75001",
      ville: "Paris",
      instructions: "",
      produits: [{ name: "SABAH", qty: 1, price: 159.63 }],
      sous_total: 159.63,
      frais_livraison: 0,
      total: 159.63
    })
  })
  .then(r => r.json())
  .then(data => {
    document.getElementById("result").textContent = JSON.stringify(data, null, 2);
  })
  .catch(err => {
    document.getElementById("result").textContent = "ERREUR : " + err.message;
  });
}
</script>
</body>
</html>
